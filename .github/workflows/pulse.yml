name: Sigma Pulse Generator
on:
  push:
    branches: [ hardening/atomic-refactor-67 ]
  schedule:
    - cron: '0 * * * *' # Runs every hour automatically

jobs:
  update-telemetry:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/checkout@v4
        with:
          python-version: '3.10'

      - name: Run Core Processor
        run: python3 processor.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Imperial-Bot"
          git config --global user.email "bot@brainrot.internal"
          git add deadpan-brainrot.json
          git commit -m "auto: pulse telemetry update [Sigma Level: Enforced]" || echo "No changes to commit"
          git push
